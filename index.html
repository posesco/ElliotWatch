<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relojes - Colombia & España</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: center;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .clocks-container {
            display: flex;
            gap: 60px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .clock-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 40px 50px;
            text-align: center;
            min-width: 300px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .clock-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .flag {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }

        .country-name {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .timezone {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 25px;
        }

        .time-display {
            font-size: 3.5rem;
            font-weight: 700;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 3px;
            background: linear-gradient(90deg, #00d2ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .seconds {
            font-size: 1.5rem;
            vertical-align: super;
        }

        .date-display {
            margin-top: 15px;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .separator {
            width: 50px;
            height: 3px;
            background: linear-gradient(90deg, #00d2ff, #7b2ff7);
            margin: 20px auto;
            border-radius: 2px;
        }

        /* Reloj analógico */
        .analog-clock {
            width: 140px;
            height: 140px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            margin: 20px auto 10px;
            position: relative;
            background: rgba(0, 0, 0, 0.3);
        }

        .analog-clock .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 4px;
        }

        .hand-hour {
            width: 4px;
            height: 35px;
            background: #fff;
            margin-left: -2px;
        }

        .hand-minute {
            width: 3px;
            height: 50px;
            background: #00d2ff;
            margin-left: -1.5px;
        }

        .hand-second {
            width: 1.5px;
            height: 55px;
            background: #ff4757;
            margin-left: -0.75px;
        }

        .center-dot {
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .clock-number {
            position: absolute;
            font-size: 0.7rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
        }

        @media (max-width: 700px) {
            .clocks-container {
                gap: 30px;
            }
            .clock-card {
                min-width: 260px;
                padding: 30px;
            }
            .time-display {
                font-size: 2.5rem;
            }
            h1 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <h1>🕐 Hora Actual</h1>

    <div class="clocks-container">

        <!-- Colombia -->
        <div class="clock-card">
            <div class="flag">🇨🇴</div>
            <div class="country-name">Colombia</div>
            <div class="timezone">UTC-5 · Bogotá</div>

            <div class="analog-clock" id="analog-co">
                <div class="center-dot"></div>
                <div class="hand hand-hour" id="hour-co"></div>
                <div class="hand hand-minute" id="min-co"></div>
                <div class="hand hand-second" id="sec-co"></div>
            </div>

            <div class="separator"></div>

            <div class="time-display" id="time-co">00:00<span class="seconds">00</span></div>
            <div class="date-display" id="date-co"></div>
        </div>

        <!-- España -->
        <div class="clock-card">
            <div class="flag">🇪🇸</div>
            <div class="country-name">España</div>
            <div class="timezone">UTC+1 / UTC+2 · Madrid</div>

            <div class="analog-clock" id="analog-es">
                <div class="center-dot"></div>
                <div class="hand hand-hour" id="hour-es"></div>
                <div class="hand hand-minute" id="min-es"></div>
                <div class="hand hand-second" id="sec-es"></div>
            </div>

            <div class="separator"></div>

            <div class="time-display" id="time-es">00:00<span class="seconds">00</span></div>
            <div class="date-display" id="date-es"></div>
        </div>

    </div>

    <script>
        // Números en el reloj analógico
        function addClockNumbers(containerId) {
            const container = document.getElementById(containerId);
            for (let i = 1; i <= 12; i++) {
                const num = document.createElement('div');
                num.className = 'clock-number';
                const angle = (i * 30 - 90) * (Math.PI / 180);
                const radius = 58;
                const x = 70 + radius * Math.cos(angle) - 6;
                const y = 70 + radius * Math.sin(angle) - 7;
                num.style.left = x + 'px';
                num.style.top = y + 'px';
                num.textContent = i;
                container.appendChild(num);
            }
        }

        addClockNumbers('analog-co');
        addClockNumbers('analog-es');

        function getTimeByZone(timezone) {
            const now = new Date();
            const options = { timeZone: timezone };
            const parts = new Intl.DateTimeFormat('en-US', {
                ...options,
                hour: '2-digit', hour12: false,
                minute: '2-digit',
                second: '2-digit',
            }).formatToParts(now);

            let h = 0, m = 0, s = 0;
            parts.forEach(p => {
                if (p.type === 'hour') h = parseInt(p.value);
                if (p.type === 'minute') m = parseInt(p.value);
                if (p.type === 'second') s = parseInt(p.value);
            });

            return { hours: h, minutes: m, seconds: s, date: now };
        }

        function updateClock(prefix, timezone) {
            const { hours, minutes, seconds, date } = getTimeByZone(timezone);

            // Reloj digital
            const hh = String(hours).padStart(2, '0');
            const mm = String(minutes).padStart(2, '0');
            const ss = String(seconds).padStart(2, '0');
            document.getElementById(`time-${prefix}`).innerHTML =
                `${hh}:${mm}<span class="seconds">${ss}</span>`;

            // Fecha
            const dateStr = date.toLocaleDateString('es-ES', {
                timeZone: timezone,
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            document.getElementById(`date-${prefix}`).textContent =
                dateStr.charAt(0).toUpperCase() + dateStr.slice(1);

            // Reloj analógico
            const secDeg = (seconds / 60) * 360;
            const minDeg = ((minutes + seconds / 60) / 60) * 360;
            const hourDeg = ((hours % 12 + minutes / 60) / 12) * 360;

            document.getElementById(`sec-${prefix}`).style.transform = `rotate(${secDeg}deg)`;
            document.getElementById(`min-${prefix}`).style.transform = `rotate(${minDeg}deg)`;
            document.getElementById(`hour-${prefix}`).style.transform = `rotate(${hourDeg}deg)`;
        }

        function tick() {
            updateClock('co', 'America/Bogota');
            updateClock('es', 'Europe/Madrid');
        }

        tick();
        setInterval(tick, 1000);
    </script>

</body>
</html>

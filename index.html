<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reloj Espacial de Elliot</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --space-bg: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --neon-blue: #00d2ff;
            --neon-purple: #7b2ff7;
            --neon-pink: #ff4757;
            --day-yellow: #ffd700;
            --day-orange: #ff8c00;
            --day-blue: #00d2ff;
            --gold: #ffd700;
            --silver: #c0c0c0;
            --star-color: #ffffff;
            --joint-color: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--space-bg);
            font-family: 'Fredoka', 'Nunito', sans-serif;
            color: #fff;
            overflow-x: hidden;
            position: relative;
        }

        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: var(--star-color);
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 6px;
            text-align: center;
            text-shadow: 0 0 20px var(--neon-blue), 0 0 40px var(--neon-purple);
            animation: pulse h1-pulse 3s infinite ease-in-out;
        }

        @keyframes h1-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .clocks-container {
            display: flex;
            gap: 80px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 40px 20px;
            width: 100%;
            max-width: 1200px;
        }

        .clock-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .clock-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            min-width: 340px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        /* Temas Condicionales */
        .theme-night::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple), var(--neon-pink));
            z-index: -1;
            border-radius: 42px;
            opacity: 0.3;
            transition: opacity 0.4s;
        }

        .theme-day::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--day-blue), var(--day-yellow), var(--day-orange));
            z-index: -1;
            border-radius: 42px;
            opacity: 0.5;
            transition: opacity 0.4s;
        }

        .theme-day.clock-card {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 45px rgba(255, 215, 0, 0.2);
        }

        .theme-day .country-name {
            color: var(--day-yellow);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }

        .theme-day .ampm-text {
            color: var(--day-orange);
        }

        .theme-day .analog-clock {
            border-color: var(--day-yellow);
            box-shadow: inset 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .theme-day .hand-second {
            background: var(--day-orange);
            box-shadow: 0 0 10px var(--day-orange);
        }

        .theme-day .separator {
            background: linear-gradient(90deg, var(--day-blue), var(--day-yellow));
        }

        .clock-card:hover::before {
            opacity: 0.8;
        }

        .clock-card:hover {
            transform: translateY(0) rotate(1deg);
            background: rgba(255, 255, 255, 0.1);
        }

        .clock-card:hover::before {
            opacity: 0.8;
        }

        /* Chibi Astronaut SVG */
        .avatar-container {
            position: relative;
            margin-bottom: -30px; /* Sitting on the card */
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s;
            cursor: pointer;
        }

        #card-co .avatar-container { width: 140px; height: 140px; }
        #card-es .avatar-container { width: 180px; height: 180px; }

        .chibi-astronaut {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        /* Emociones Rasgos */
        .mouth-happy, .mouth-sad, .mouth-angry,
        .brow-sad, .brow-angry {
            display: none;
        }

        /* Estado: Feliz (Default) */
        .emotion-feliz .mouth-happy { display: block !important; }
        
        /* Estado: Triste */
        .emotion-triste .mouth-happy { display: none !important; }
        .emotion-triste .mouth-sad { display: block !important; }
        .emotion-triste .brow-sad { display: block !important; }

        /* Estado: Ira */
        .emotion-ira .mouth-happy { display: none !important; }
        .emotion-ira .mouth-angry { display: block !important; }
        .emotion-ira .brow-angry { display: block !important; }

        /* Capas Chibi Animaciones */
        .awake .chibi-master {
            animation: chibi-float 4s infinite ease-in-out;
        }

        .awake .eye-lid {
            animation: chibi-blink 5s infinite;
        }

        .asleep .chibi-master {
            animation: chibi-breathe 5s infinite ease-in-out;
        }

        .asleep .eye-lid {
            transform: scaleY(0); /* Ojos cerrados */
        }

        .asleep .eye-static {
            display: block !important;
        }

        .asleep .zzz-group {
            display: block !important;
            animation: zzz-float 3s infinite linear;
        }

        @keyframes chibi-float {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-8px) rotate(2deg); }
        }

        @keyframes chibi-breathe {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(2px) scale(1.02); }
        }

        @keyframes chibi-blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0); }
        }

        @keyframes zzz-float {
            0% { transform: translate(0, 0) scale(0.5); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translate(20px, -40px) scale(1.5); opacity: 0; }
        }

        .country-name {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 5px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
        }

        .person-label {
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffda79;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .timezone {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 25px;
            font-family: 'Nunito', sans-serif;
        }

        /* Reloj Analógico Espacial */
        .analog-clock {
            width: 160px;
            height: 160px;
            border: 4px solid var(--neon-blue);
            border-radius: 50%;
            margin: 20px auto;
            position: relative;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: inset 0 0 20px var(--neon-blue);
        }

        .analog-clock .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 10px;
        }

        .hand-hour {
            width: 8px;
            height: 45px;
            background: var(--neon-pink);
            margin-left: -4px;
            z-index: 3;
        }
        .hand-hour::after {
            content: '🚀';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%) rotate(0deg);
            font-size: 1.2rem;
        }

        .hand-minute {
            width: 6px;
            height: 60px;
            background: var(--neon-blue);
            margin-left: -3px;
            z-index: 2;
        }
        .hand-minute::after {
            content: '⭐';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1rem;
        }

        .hand-second {
            width: 2px;
            height: 70px;
            background: #fff;
            margin-left: -1px;
            z-index: 1;
            box-shadow: 0 0 10px #fff;
        }

        .center-dot {
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        .clock-number {
            position: absolute;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 5px var(--neon-blue);
        }

        .separator {
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            margin: 25px auto;
            border-radius: 10px;
        }

        .time-display {
            font-size: 3.2rem;
            font-weight: 700;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        .ampm-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            font-size: 1.2rem;
            line-height: 1;
        }

        .ampm-text {
            color: var(--neon-blue);
            font-weight: 700;
        }

        .day-night-icon {
            font-size: 1.5rem;
        }

        .seconds {
            font-size: 1.4rem;
            color: rgba(255, 255, 255, 0.5);
            margin-left: 5px;
        }

        .date-display {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            font-family: 'Nunito', sans-serif;
        }

        @media (max-width: 750px) {
            h1 { font-size: 1.8rem; }
            .clocks-container { gap: 30px; }
            .clock-card { min-width: 280px; padding: 30px; }
            .time-display { font-size: 2.5rem; }
        }
    </style>
</head>

    <script>
        function createStars() {
            const container = document.getElementById('stars');
            const count = 150;
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.setProperty('--duration', `${Math.random() * 3 + 2}s`);
                container.appendChild(star);
            }
        }
        createStars();

        function addClockNumbers(containerId) {
            const container = document.getElementById(containerId);
            for (let i = 1; i <= 12; i++) {
                const num = document.createElement('div');
                num.className = 'clock-number';
                const angle = (i * 30 - 90) * (Math.PI / 180);
                const radius = 65;
                const x = 80 + radius * Math.cos(angle) - 8;
                const y = 80 + radius * Math.sin(angle) - 10;
                num.style.left = x + 'px';
                num.style.top = y + 'px';
                num.textContent = i;
                container.appendChild(num);
            }
        }

        addClockNumbers('analog-co');
        addClockNumbers('analog-es');

        function getTimeByZone(timezone) {
            const now = new Date();
            const options = { timeZone: timezone };
            const formatter = new Intl.DateTimeFormat('en-US', {
                ...options,
                hour: 'numeric', hour12: false,
                minute: '2-digit',
                second: '2-digit',
            });
            const parts = formatter.formatToParts(now);
            let h = 0, m = 0, s = 0;
            parts.forEach(p => {
                if (p.type === 'hour') h = parseInt(p.value);
                if (p.type === 'minute') m = parseInt(p.value);
                if (p.type === 'second') s = parseInt(p.value);
            });
            return { hours24: h, minutes: m, seconds: s, date: now };
        }

        function setEmotion(prefix, emotion) {
            const container = document.querySelector(`#col-${prefix} .avatar-container`);
            if (!container) return;
            container.classList.remove('emotion-feliz', 'emotion-triste', 'emotion-ira');
            container.classList.add(`emotion-${emotion}`);
        }

        // Cambio de emociones cíclico al hacer clic
        const emocionesCiclo = ['feliz', 'triste', 'ira'];
        document.querySelectorAll('.avatar-container').forEach(container => {
            container.addEventListener('click', function() {
                const prefix = this.parentElement.id.replace('col-', '');
                let currentEmotion = emocionesCiclo.find(e => this.classList.contains(`emotion-${e}`)) || 'feliz';
                let nextIndex = (emocionesCiclo.indexOf(currentEmotion) + 1) % emocionesCiclo.length;
                setEmotion(prefix, emocionesCiclo[nextIndex]);
            });
        });

        function updateClock(prefix, timezone) {
            const { hours24, minutes, seconds, date } = getTimeByZone(timezone);

            const ampm = hours24 >= 12 ? 'PM' : 'AM';
            const hours12 = hours24 % 12 || 12;
            const isDay = hours24 >= 6 && hours24 < 21; // Awake 6AM to 9PM
            const icon = (hours24 >= 6 && hours24 < 18) ? '☀️' : '🌙';

            // State management (Astronaut)
            const container = document.querySelector(`#col-${prefix} .avatar-container`);
            const card = document.getElementById(`card-${prefix}`);
            
            if (isDay) {
                container.classList.add('awake');
                container.classList.remove('asleep');
                card.classList.add('theme-day');
                card.classList.remove('theme-night');
            } else {
                container.classList.add('asleep');
                container.classList.remove('awake');
                card.classList.add('theme-night');
                card.classList.remove('theme-day');
            }

            document.getElementById(`time-${prefix}`).textContent = `${String(hours12).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
            document.getElementById(`sec-text-${prefix}`).textContent = String(seconds).padStart(2, '0');
            document.getElementById(`ampm-${prefix}`).textContent = ampm;
            document.getElementById(`icon-${prefix}`).textContent = icon;

            const dateStr = date.toLocaleDateString('es-ES', {
                timeZone: timezone,
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            document.getElementById(`date-${prefix}`).textContent =
                dateStr.charAt(0).toUpperCase() + dateStr.slice(1);

            const secDeg = (seconds / 60) * 360;
            const minDeg = ((minutes + seconds / 60) / 60) * 360;
            const hourDeg = ((hours24 % 12 + minutes / 60) / 12) * 360;

            document.getElementById(`sec-${prefix}`).style.transform = `rotate(${secDeg}deg)`;
            document.getElementById(`min-${prefix}`).style.transform = `rotate(${minDeg}deg)`;
            document.getElementById(`hour-${prefix}`).style.transform = `rotate(${hourDeg}deg)`;
        }

        function tick() {
            updateClock('co', 'America/Bogota');
            updateClock('es', 'Europe/Madrid');
        }

        tick();
        setInterval(tick, 1000);
    </script>
</body>
</html>

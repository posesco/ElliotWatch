<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Aventuras espaciales de Elliot</title>
    <meta name="description" content="Reloj espacial interactivo para conectar los mundos de Elliot y su Papá.">
    <meta name="theme-color" content="#00d2ff">
    
    <!-- PWA & Security -->
    <link rel="manifest" href="manifest.json">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; script-src 'self' 'unsafe-inline';">

    <!-- Favicon -->
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <div class="stars-container" id="stars" aria-hidden="true"></div>

    <header>
        <h1>🚀 Aventuras espaciales de Elliot 👨‍🚀</h1>
        <h2 class="subtitle">Relojes del mundo</h2>
    </header>

    <main class="clocks-container">

        <!-- Colombia - Elliot -->
        <article class="clock-column" id="col-co" aria-label="Reloj de Elliot en Colombia">
            <div class="avatar-container emotion-feliz" aria-hidden="true">
                <!-- SVG inyectado por JS -->
            </div>
            <div class="clock-card" id="card-co" role="button" aria-label="Ver detalles de hora en Colombia">
                <div class="person-label">🇨🇴 Elliot 🇨🇴</div>
                <div class="country-name">Colombia</div>
                <div class="timezone">Bogotá (UTC-5)</div>

                <div class="separator" aria-hidden="true"></div>

                <div class="time-display" role="timer" aria-live="polite">
                    <span id="time-co">00:00</span>
                    <span class="seconds" id="sec-text-co">00</span>
                    <div class="ampm-group">
                        <span class="day-night-icon" id="icon-co" aria-hidden="true">☀️</span>
                        <span class="ampm-text" id="ampm-co">AM</span>
                    </div>
                </div>
                <div class="date-display" id="date-co"></div>
            </div>
        </article>

        <!-- España - Papá -->
        <article class="clock-column" id="col-es" aria-label="Reloj de Papá en España">
            <div class="avatar-container emotion-feliz" aria-hidden="true">
                <!-- SVG inyectado por JS -->
            </div>
            <div class="clock-card" id="card-es" role="button" aria-label="Ver detalles de hora en España">
                <div class="person-label">🇪🇸 Papá 🇪🇸</div>
                <div class="country-name">España</div>
                <div class="timezone">Madrid (UTC+1/2)</div>

                <div class="separator" aria-hidden="true"></div>

                <div class="time-display" role="timer" aria-live="polite">
                    <span id="time-es">00:00</span>
                    <span class="seconds" id="sec-text-es">00</span>
                    <div class="ampm-group">
                        <span class="day-night-icon" id="icon-es" aria-hidden="true">☀️</span>
                        <span class="ampm-text" id="ampm-es">AM</span>
                    </div>
                </div>
                <div class="date-display" id="date-es"></div>
            </div>
        </article>

    </main>

    <footer class="footer">
        <a href="http://jesusposada.website/" target="_blank" rel="noopener noreferrer" aria-label="Visitar sitio web personal de Jesús Posada">
            Hecho con ❤️ para mi hijo 🧑‍🚀<br>jesusposada.website
        </a>
    </footer>

    <!-- Scripts -->
    <script src="js/main.js" defer></script>
</body>
</html>
